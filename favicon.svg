<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- bg -->
  <circle cx="50" cy="50" r="48" fill="#060a0e"/>
  <circle cx="50" cy="50" r="48" fill="url(#glow)"/>
  <!-- yin yang body -->
  <g filter="url(#neon)">
    <!-- full circle outline -->
    <circle cx="50" cy="50" r="36" fill="none" stroke="#4ade80" stroke-width="2.2"/>
    <!-- top half dark, bottom half light — using paths -->
    <!-- white (green-lit) half -->
    <path d="M50 14 A36 36 0 0 1 50 86 A18 18 0 0 1 50 50 A18 18 0 0 0 50 14Z" fill="#0d2a18"/>
    <!-- dark half -->
    <path d="M50 14 A36 36 0 0 0 50 86 A18 18 0 0 0 50 50 A18 18 0 0 1 50 14Z" fill="#4ade80" fill-opacity="0.18"/>
    <!-- top small circle (light) -->
    <circle cx="50" cy="32" r="9" fill="#4ade80" fill-opacity="0.22"/>
    <circle cx="50" cy="32" r="9" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <!-- bottom small circle (dark) -->
    <circle cx="50" cy="68" r="9" fill="#060a0e"/>
    <circle cx="50" cy="68" r="9" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <!-- top dot -->
    <circle cx="50" cy="32" r="3.5" fill="#4ade80"/>
    <!-- bottom dot -->
    <circle cx="50" cy="68" r="3.5" fill="#0d2a18"/>
    <circle cx="50" cy="68" r="3.5" fill="none" stroke="#4ade80" stroke-width="1"/>
  </g>
  <!-- outer glow ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.25"/>
</svg>
